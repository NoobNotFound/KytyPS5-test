name: Build Windows

# Manual trigger only — never runs on push/PR/schedule.
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "CMake build type"
        required: false
        default: "Release"
        type: choice
        options:
          - Release
          - RelWithDebInfo
          - Debug

env:
  QT_VERSION: "6.7.2"
  VULKAN_SDK_VERSION: "1.3.290.0"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_SDK_VERSION }}
          install_runtime: true
          cache: true
          stripdown: true

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtimageformats
          cache: true

      - name: Setup MSVC dev environment (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # The repo vendors its own Vulkan-Headers via submodule (3rdparty/Vulkan-Headers),
      # pinned to a specific spec snapshot. CMakeLists.txt separately auto-appends
      # $VULKAN_SDK/Include onto the include path whenever VULKAN_SDK is set. The SDK's
      # pre-generated vk_enum_string_helper.h is from a different generator vintage than
      # whatever the submodule happens to be pinned to, and the two are not guaranteed to
      # agree on enum names/gating (VK_ENABLE_BETA_EXTENSIONS, vendor-reserved slots, etc).
      # Pinning the CI's SDK version to "whatever matches today" is fragile — it breaks
      # again the next time the submodule is bumped. Instead: capture the SDK's Lib dir
      # for linking, then unset VULKAN_SDK before configuring so its Include dir is never
      # added, and the submodule's self-consistent headers are the only ones the compiler
      # ever sees.
      - name: Capture Vulkan SDK lib path, then isolate its headers
        shell: pwsh
        run: |
          echo "VULKAN_SDK_LIB_DIR=$env:VULKAN_SDK\Lib" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Configure (CMake + Ninja + clang-cl)
        shell: pwsh
        run: |
          Remove-Item Env:VULKAN_SDK -ErrorAction SilentlyContinue
          cmake -S src -B _Build/windows -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type }} `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" `
            -DCMAKE_EXE_LINKER_FLAGS="/LIBPATH:`"$env:VULKAN_SDK_LIB_DIR`""

      - name: Build launcher target
        shell: cmd
        run: cmake --build _Build/windows --target launcher --config ${{ github.event.inputs.build_type }}

      - name: Install / stage runnable build
        shell: cmd
        run: cmake --install _Build/windows --prefix _Build/windows/install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KytyPS5-windows-${{ github.event.inputs.build_type }}-${{ github.sha }}
          path: _Build/windows/install/**
          if-no-files-found: error
          retention-days: 14
