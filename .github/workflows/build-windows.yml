name: Build Windows

# Manual trigger only — never runs on push/PR/schedule.
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "CMake build type"
        required: false
        default: "Release"
        type: choice
        options:
          - Release
          - RelWithDebInfo
          - Debug

env:
  QT_VERSION: "6.7.2"
  VULKAN_SDK_VERSION: "1.3.290.0"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_SDK_VERSION }}
          install_runtime: true
          cache: true
          stripdown: true

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtimageformats
          cache: true

      - name: Setup MSVC dev environment (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # The repo vendors its own Vulkan-Headers via submodule (3rdparty/Vulkan-Headers),
      # pinned to a specific spec snapshot (Vulkan-Headers commit, ~Vulkan 1.4.335).
      # 3rdparty/CMakeLists.txt uses find_library(... PATHS "$ENV{VULKAN_SDK}/Lib" ...)
      # to locate vulkan-1.lib, so VULKAN_SDK must stay set for the linker import lib.
      #
      # Separately, several source files include <vulkan/vk_enum_string_helper.h>. That
      # header is NOT part of Vulkan-Headers at all — it's generated by the Khronos
      # "Vulkan-Utility-Libraries" project and only reaches us bundled inside the LunarG
      # SDK's Include dir. The SDK's bundled copy is from a different generator snapshot
      # than the vendored Vulkan-Headers submodule, so some identifiers it references are
      # gated differently (VK_ENABLE_BETA_EXTENSIONS) or don't exist at all in the
      # submodule's vulkan_core.h, causing undeclared-identifier/duplicate-case errors.
      #
      # Fix: pull a current vk_enum_string_helper.h straight from Vulkan-Utility-Libraries
      # (which tracks Vulkan-Headers closely and gates the same identifiers the same way)
      # and overwrite the SDK's stale copy with it, then define VK_ENABLE_BETA_EXTENSIONS
      # so both sides agree on which identifiers are visible. This avoids hiding VULKAN_SDK
      # from CMake entirely, which would break the Lib lookup.
      - name: Patch stale vk_enum_string_helper.h bundled in the Vulkan SDK
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Utility-Libraries.git "$env:RUNNER_TEMP\vul"
          Copy-Item "$env:RUNNER_TEMP\vul\include\vulkan\vk_enum_string_helper.h" `
                     "$env:VULKAN_SDK\Include\vulkan\vk_enum_string_helper.h" -Force

      - name: Configure (CMake + Ninja + clang-cl)
        shell: pwsh
        run: |
          cmake -S src -B _Build/windows -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type }} `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" `
            -DCMAKE_C_FLAGS="/DVK_ENABLE_BETA_EXTENSIONS" `
            -DCMAKE_CXX_FLAGS="/DVK_ENABLE_BETA_EXTENSIONS"

      - name: Build launcher target
        shell: cmd
        run: cmake --build _Build/windows --target launcher --config ${{ github.event.inputs.build_type }}

      - name: Install / stage runnable build
        shell: cmd
        run: cmake --install _Build/windows --prefix _Build/windows/install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KytyPS5-windows-${{ github.event.inputs.build_type }}-${{ github.sha }}
          path: _Build/windows/install/**
          if-no-files-found: error
          retention-days: 14
